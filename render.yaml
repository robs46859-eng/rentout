services:
  - type: web
    name: rentout-app
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: rentout-db
          property: connectionString
      - key: PGSSL
        value: "false"
      - key: SESSION_TTL_DAYS
        value: "14"
      - key: MFA_ISSUER
        value: RentOut
      - key: MFA_CHALLENGE_TTL_MINUTES
        value: "10"
      - key: OPERATOR_BOOTSTRAP_EMAIL
        sync: false
      - key: OPERATOR_BOOTSTRAP_PASSWORD
        sync: false
      - key: OPERATOR_BOOTSTRAP_NAME
        value: Platform Admin
      - key: RENTCAST_API_KEY
        sync: false
      - key: CENSUS_API_KEY
        sync: false

databases:
  - name: rentout-db
    plan: starter
    databaseName: rentout
    user: rentout
